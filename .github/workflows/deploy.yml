name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Set ubuntu ownership for rsync
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /var/www/margo

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='wp-config.php' \
            --exclude='wp-admin/' \
            --exclude='wp-includes/' \
            --exclude='wp-content/uploads/' \
            --exclude='wp-content/cache/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/margo/

      - name: Restore www-data ownership and permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/margo
            sudo chmod -R 755 /var/www/margo
            sudo chmod 640 /var/www/margo/wp-config.php
            sudo chmod -R 775 /var/www/margo/wp-content/uploads
            sudo chmod -R 775 /var/www/margo/wp-content/cache
            echo "✅ Deployment completed successfully!"
